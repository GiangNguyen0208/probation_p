services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: social-intel-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: social-intel-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: social-api-gateway/Dockerfile
    command: uvicorn social_api_gateway.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env

  worker:
    build:
      context: .
      dockerfile: social-data-collector/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env

  alert-engine:
    build:
      context: .
      dockerfile: social-alert-engine/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env

  mini-app:
    build:
      context: .
      dockerfile: social-mini-app/Dockerfile
    restart: unless-stopped
    ports:
      - "${MINI_APP_PORT:-80}:80"
    depends_on:
      - api-gateway

volumes:
  timescale_data:
  redis_data:
